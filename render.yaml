services:
  - type: web
    name: whatsapp-clone-backend
    env: node
    region: oregon
    plan: free
    rootDir: backend

    buildCommand: npm install && npm run build
    startCommand: npm start

    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 10000

      - key: MONGODB_URI
        sync: false

      - key: JWT_ACCESS_SECRET
        generateValue: true

      - key: JWT_REFRESH_SECRET
        generateValue: true

      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m

      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d

      - key: CLIENT_URL
        sync: false

      - key: SOCKET_CORS_ORIGIN
        sync: false

      - key: CLOUDINARY_CLOUD_NAME
        sync: false

      - key: CLOUDINARY_API_KEY
        sync: false

      - key: CLOUDINARY_API_SECRET
        sync: false

      - key: RATE_LIMIT_WINDOW_MS
        value: 900000

      - key: RATE_LIMIT_MAX
        value: 100